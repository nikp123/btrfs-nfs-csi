name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/erikmagkekse/btrfs-nfs-csi

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      suffix: ${{ steps.version.outputs.suffix }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main or edge
        run: |
          BRANCHES=$(git branch -r --contains "$GITHUB_SHA" | sed 's/^ *//')
          echo "Tag ${GITHUB_REF_NAME} found on:"
          echo "$BRANCHES"
          if ! echo "$BRANCHES" | grep -qxE 'origin/(main|edge)'; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main or edge branch"
            exit 1
          fi

      - name: Determine version
        id: version
        run: |
          VERSION=$(cat VERSION)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          # Allow optional revision suffix on edge tags (e.g. v0.10.0-edge-r1)
          TAG_BASE="${TAG_VERSION%-r[0-9]*}"
          if [[ "${TAG_BASE}" != "${VERSION}" && "${TAG_BASE}" != "${VERSION}-edge" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match VERSION file (${VERSION} or ${VERSION}-edge)"
            exit 1
          fi
          # Suffix carries the full -edge-rN so helm retags get a unique chart version
          SUFFIX="${TAG_VERSION#${VERSION}}"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Verify version bump
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-edge* ]]; then
            PREV_TAG=$(git describe --tags --abbrev=0 --match 'v*-edge*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          else
            PREV_TAG=$(git describe --tags --abbrev=0 --exclude '*-edge*' "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          fi
          if [[ -z "$PREV_TAG" ]]; then
            echo "No previous tag found, skipping version check"
            exit 0
          fi
          echo "Comparing against: ${PREV_TAG}"

          # Edge retags share the same VERSION/Chart version; only the -rN bumps.
          CURR_BASE="${GITHUB_REF_NAME%-r[0-9]*}"
          PREV_BASE="${PREV_TAG%-r[0-9]*}"
          if [[ "${CURR_BASE}" == "${PREV_BASE}" ]]; then
            CURR_REV=0
            PREV_REV=0
            if [[ "${GITHUB_REF_NAME}" =~ -r([0-9]+)$ ]]; then
              CURR_REV="${BASH_REMATCH[1]}"
            fi
            if [[ "${PREV_TAG}" =~ -r([0-9]+)$ ]]; then
              PREV_REV="${BASH_REMATCH[1]}"
            fi
            if (( CURR_REV <= PREV_REV )); then
              echo "::error::Revision (r${CURR_REV}) must be greater than r${PREV_REV} (${PREV_TAG})"
              exit 1
            fi
            echo "Edge retag: ${PREV_TAG} -> ${GITHUB_REF_NAME}, skipping VERSION/Chart bump check"
            exit 0
          fi

          PREV_VERSION=$(git show "${PREV_TAG}:VERSION")
          CURR_VERSION=$(cat VERSION)
          if [[ "$(printf '%s\n' "$PREV_VERSION" "$CURR_VERSION" | sort -V | head -1)" == "$CURR_VERSION" ]]; then
            echo "::error::VERSION (${CURR_VERSION}) must be greater than ${PREV_VERSION} (${PREV_TAG})"
            exit 1
          fi

          PREV_CHART=$(git show "${PREV_TAG}:charts/btrfs-nfs-csi/Chart.yaml" | grep '^version:' | awk '{print $2}')
          CURR_CHART=$(grep '^version:' charts/btrfs-nfs-csi/Chart.yaml | awk '{print $2}')
          if [[ "$(printf '%s\n' "$PREV_CHART" "$CURR_CHART" | sort -V | head -1)" == "$CURR_CHART" ]]; then
            echo "::error::Chart version (${CURR_CHART}) must be greater than ${PREV_CHART} (${PREV_TAG})"
            exit 1
          fi

          APP_VERSION=$(grep '^appVersion:' charts/btrfs-nfs-csi/Chart.yaml | sed 's/.*"\(.*\)"/\1/')
          if [[ "$APP_VERSION" != "$CURR_VERSION" ]]; then
            echo "::error::Chart appVersion (${APP_VERSION}) does not match VERSION (${CURR_VERSION})"
            exit 1
          fi

          if git diff "${PREV_TAG}" -- go.mod go.sum | grep -q .; then
            PREV_HASH=$(git show "${PREV_TAG}:package.nix" 2>/dev/null | grep 'vendorHash' | awk -F'"' '{print $2}')
            CURR_HASH=$(grep 'vendorHash' package.nix | awk -F'"' '{print $2}')
            if [[ -n "$PREV_HASH" && "$PREV_HASH" == "$CURR_HASH" ]]; then
              echo "::error::go.mod/go.sum changed but vendorHash in package.nix is unchanged"
              exit 1
            fi
            echo "vendorHash: ${PREV_HASH:-new} -> ${CURR_HASH}"
          fi

          echo "VERSION: ${PREV_VERSION} -> ${CURR_VERSION}"
          echo "Chart version: ${PREV_CHART} -> ${CURR_CHART}"

  build:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:${{ needs.check.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.check.outputs.version }}
            COMMIT=${{ needs.check.outputs.commit }}
          labels: |
            org.opencontainers.image.version=${{ needs.check.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  binaries:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w \
            -X main.version=${{ needs.check.outputs.version }} \
            -X main.commit=${{ needs.check.outputs.commit }}" \
            -o btrfs-nfs-csi-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/btrfs-nfs-csi/

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: btrfs-nfs-csi-*

  release:
    runs-on: ubuntu-latest
    needs: [check, binaries, build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          for f in btrfs-nfs-csi-linux-*; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          if [[ "${{ needs.check.outputs.suffix }}" == -edge* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE.md \
            $PRERELEASE \
            btrfs-nfs-csi-*

  helm:
    needs: [check, build]
    uses: ./.github/workflows/helm-release.yml
    with:
      suffix: ${{ needs.check.outputs.suffix }}
    permissions:
      contents: read
      packages: write
