name: CI

on:
  push:
    branches: [edge]
    paths:
      - "**.go"
      - "**.html"
      - "go.mod"
      - "go.sum"
      - "Containerfile*"
      - "VERSION"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, edge]
    paths:
      - "**.go"
      - "**.html"
      - "go.mod"
      - "go.sum"
      - "Containerfile*"
      - "VERSION"
      - ".github/workflows/ci.yml"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/erikmagkekse/btrfs-nfs-csi

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l .)"

      # This is also running go vet already
      - name: Lint
        uses: golangci/golangci-lint-action@v9

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Hope this works
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y btrfs-progs nfs-kernel-server

      - name: Integration tests
        run: sudo go test -race ./... -tags integration -v -count=1

  build:
    runs-on: ubuntu-latest
    needs: [test, integration]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          echo "version=$(cat VERSION)-edge" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref_name == 'edge'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: ${{ github.ref_name == 'edge' }}
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
